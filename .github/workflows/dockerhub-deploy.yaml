name: Build and update deployment image

on:
  push:
    branches:
      - main
    paths-ignore:
      - kubernetes/deployment.yaml
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/lineten-portfolio

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:latest

      - name: Update Kubernetes deployment image
        run: |
          sed -i "s|image: .*|image: ${IMAGE_REPOSITORY}:${IMAGE_TAG}|" kubernetes/deployment.yaml
          git diff -- kubernetes/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kubernetes/deployment.yaml
          git commit -m "Update deployment image to ${IMAGE_TAG}" || exit 0
          git push

